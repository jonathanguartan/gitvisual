<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 380px; height: 220px;
      background: transparent;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
      -webkit-app-region: drag;
    }

    .card {
      background: #1e1e2e;
      border: 1px solid #313244;
      border-radius: 14px;
      width: 340px; height: 180px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px;
      box-shadow: 0 8px 32px rgba(0,0,0,.7);
    }

    .logo-img { width: 72px; height: 72px; object-fit: contain; }

    .title {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }
    .title-main {
      color: #cdd6f4;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .2px;
    }
    .title-main span { color: #89b4fa; }
    .title-sub {
      color: #6c7086;
      font-size: 11px;
      font-weight: 400;
      letter-spacing: .4px;
      text-transform: uppercase;
    }

    .dots { display: flex; gap: 7px; }
    .dot  {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #89b4fa;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: .2s; }
    .dot:nth-child(3) { animation-delay: .4s; }

    @keyframes bounce {
      0%, 80%, 100% { opacity: .2; transform: scale(.75); }
      40%           { opacity:  1; transform: scale(1);   }
    }
  </style>
</head>
<body>
  <div class="card">
    <img src="../public/images/logos/dark.png" class="logo-img" alt="GitVisual" />
    <div class="title">
      <div class="title-main">Git<span>Visual</span></div>
      <div class="title-sub">Gestor visual de GIT</div>
    </div>
    <div class="dots">
      <div class="dot"></div>
      <div class="dot"></div>
      <div class="dot"></div>
    </div>
  </div>
</body>
</html>
